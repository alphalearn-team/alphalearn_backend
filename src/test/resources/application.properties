imposter.websocket.enabled=false
storage.r2.enabled=false
storage.r2.presign-expiry-minutes=15
storage.r2.max-upload-size-bytes=52428800

# Test fallbacks for CI context bootstrap.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_JWKS_URL:http://127.0.0.1:54321/auth/v1/.well-known/jwks.json}
