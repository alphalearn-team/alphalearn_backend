spring.application.name=alphalearn

spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Theoretically prevents error where supabase runs out of errors
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

spring.web.error.include-message=always

# JWT (Supabase Auth via JWKS)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWT_JWKS_URL:}

# Enable security debug logging
logging.level.org.springframework.security=DEBUG

weekly-quest.zone-id=${WEEKLY_QUEST_ZONE_ID:UTC}
weekly-quest.fallback.concept-public-id=${WEEKLY_QUEST_FALLBACK_CONCEPT_PUBLIC_ID:00000000-0000-0000-0000-000000000000}
weekly-quest.fallback.quest-template-public-id=${WEEKLY_QUEST_FALLBACK_TEMPLATE_PUBLIC_ID:00000000-0000-0000-0000-000000000000}
weekly-quest.reminder.daily-hour=${WEEKLY_QUEST_REMINDER_DAILY_HOUR:9}
weekly-quest.reminder.daily-minute=${WEEKLY_QUEST_REMINDER_DAILY_MINUTE:0}
weekly-quest.activation.poll-minutes=${WEEKLY_QUEST_ACTIVATION_POLL_MINUTES:10}

storage.r2.enabled=${CLOUDFLARE_R2_ENABLED:false}
storage.r2.account-id=${CLOUDFLARE_R2_ACCOUNT_ID:}
storage.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:}
storage.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:}
storage.r2.bucket=${CLOUDFLARE_R2_BUCKET:}
storage.r2.public-base-url=${CLOUDFLARE_R2_PUBLIC_BASE_URL:}
storage.r2.presign-expiry-minutes=${CLOUDFLARE_R2_PRESIGN_EXPIRY_MINUTES:15}
storage.r2.max-upload-size-bytes=${CLOUDFLARE_R2_MAX_UPLOAD_SIZE_BYTES:52428800}

zerogpt.api.key=${ZEROGPT_API_KEY:}
zerogpt.ai-threshold=${ZEROGPT_AI_THRESHOLD:80}
