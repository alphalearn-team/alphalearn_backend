name: Backend CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Backend CD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate DB env
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "DB_URL is empty"
            exit 1
          fi
          if echo "$DB_URL" | grep -q '^\${'; then
            echo "DB_URL unresolved placeholder"
            exit 1
          fi
          if ! echo "$DB_URL" | grep -q '^jdbc:postgresql://'; then
            echo "DB_URL must start with jdbc:postgresql://"
            exit 1
          fi

      - name: Apply pending Supabase migrations
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CI_DB_URL="${DB_URL#jdbc:}"
          if [ "$CI_DB_URL" = "$DB_URL" ]; then
            echo "DB_URL must start with jdbc:"
            exit 1
          fi
          if [ -z "$DB_USER" ]; then
            echo "DB_USER is empty"
            exit 1
          fi
          if [ -z "$DB_PASSWORD" ]; then
            echo "DB_PASSWORD is empty"
            exit 1
          fi
          export PGUSER="$DB_USER"
          export PGPASSWORD="$DB_PASSWORD"
          supabase migration up --db-url "$CI_DB_URL"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Validate deployment configuration
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
        run: |
          test -n "$AWS_REGION" || (echo "AWS_REGION is required" && exit 1)
          test -n "$ECR_REPOSITORY_URI" || (echo "ECR_REPOSITORY_URI is required" && exit 1)

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract image tags
        id: image
        run: |
          echo "sha_tag=${ECR_REPOSITORY_URI}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${ECR_REPOSITORY_URI}:latest" >> "$GITHUB_OUTPUT"
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Trigger App Runner deployment
        if: ${{ vars.APP_RUNNER_SERVICE_ARN != '' }}
        run: aws apprunner start-deployment --service-arn "$APP_RUNNER_SERVICE_ARN"
        env:
          APP_RUNNER_SERVICE_ARN: ${{ vars.APP_RUNNER_SERVICE_ARN }}

      - name: Skip App Runner deployment
        if: ${{ vars.APP_RUNNER_SERVICE_ARN == '' }}
        run: echo "Skipping App Runner deployment because APP_RUNNER_SERVICE_ARN is not configured yet."
