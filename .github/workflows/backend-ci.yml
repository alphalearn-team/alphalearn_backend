name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to hosted CI DB
        env:
          CI_DB_URL_JDBC: ${{ secrets.CI_DB_URL_JDBC }}
          CI_DB_USER: ${{ secrets.CI_DB_USER }}
          CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        run: |
          ENCODED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CI_DB_PASSWORD"], safe=""))')"
          PG_URL="postgresql://${CI_DB_USER}:${ENCODED_DB_PASSWORD}@${CI_DB_URL_JDBC#jdbc:postgresql://}"
          supabase migration up --db-url "$PG_URL"

      - name: Build and run tests
        env:
          DB_URL: ${{ secrets.CI_DB_URL_JDBC }}
          DB_USER: ${{ secrets.CI_DB_USER }}
          DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          SUPABASE_JWT_JWKS_URL: ${{ secrets.CI_SUPABASE_JWKS_URL }}
        run: ./mvnw -B clean verify

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t alphalearn-backend:${{ github.sha }} .
