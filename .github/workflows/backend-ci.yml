name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: |
          supabase start

      - name: Reset local Supabase DB from migrations
        run: |
          supabase db reset --local --yes --debug

      - name: Build and run tests
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:54322/postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          SUPABASE_JWT_JWKS_URL: http://127.0.0.1:54321/auth/v1/.well-known/jwks.json
        run: mvn -B clean verify

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t alphalearn-backend:${{ github.sha }} .

      - name: Stop Supabase local stack
        if: always()
        run: supabase stop
