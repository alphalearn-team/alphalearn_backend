name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Backend CI
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify postgres connectivity
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable" -c "select version();"

      - name: Apply pending Supabase migrations
        env:
          PGSSLMODE: disable
        run: |
          supabase migration up --debug --db-url "postgresql://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"

      - name: Build and run tests
        env:
          DB_URL: jdbc:postgresql://127.0.0.1:5432/postgres
          DB_USER: postgres
          DB_PASSWORD: postgres
          SUPABASE_JWT_SECRET: test-secret-for-ci-only
        run: mvn -B clean verify

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t alphalearn-backend:${{ github.sha }} .
