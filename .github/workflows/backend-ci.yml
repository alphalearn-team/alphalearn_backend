name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate DB env
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "DB_URL is empty"
            exit 1
          fi
          if echo "$DB_URL" | grep -q '^\${'; then
            echo "DB_URL unresolved placeholder"
            exit 1
          fi
          if ! echo "$DB_URL" | grep -q '^jdbc:postgresql://'; then
            echo "DB_URL must start with jdbc:postgresql://"
            exit 1
          fi

      - name: Apply pending Supabase migrations
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          CI_DB_URL="${DB_URL#jdbc:}"
          if [ "$CI_DB_URL" = "$DB_URL" ]; then
            echo "DB_URL must start with jdbc:"
            exit 1
          fi
          if [ -z "$DB_USER" ]; then
            echo "DB_USER is empty"
            exit 1
          fi
          if [ -z "$DB_PASSWORD" ]; then
            echo "DB_PASSWORD is empty"
            exit 1
          fi
          export PGUSER="$DB_USER"
          export PGPASSWORD="$DB_PASSWORD"
          npx supabase migration up --db-url "$CI_DB_URL"

      - name: Build and run tests
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SUPABASE_JWT_JWKS_URL: ${{ vars.SUPABASE_JWT_JWKS_URL }}
        run: mvn -B clean verify

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t alphalearn-backend:${{ github.sha }} .
