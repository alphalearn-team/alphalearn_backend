name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to hosted CI DB
        env:
          CI_DB_URL_JDBC: ${{ secrets.CI_DB_URL_JDBC }}
          CI_DB_USER: ${{ secrets.CI_DB_USER }}
          CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
        run: |
          ENCODED_DB_PASSWORD="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["CI_DB_PASSWORD"], safe=""))')"
          PG_URL="postgresql://${CI_DB_USER}:${ENCODED_DB_PASSWORD}@${CI_DB_URL_JDBC#jdbc:postgresql://}"
          supabase migration up --db-url "$PG_URL"

      - name: Build and run tests
        env:
          SPRING_PROFILES_ACTIVE: ci
          CI_DB_URL_JDBC: ${{ secrets.CI_DB_URL_JDBC }}
          CI_DB_USER: ${{ secrets.CI_DB_USER }}
          CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          CI_SUPABASE_JWKS_URL: ${{ secrets.CI_SUPABASE_JWKS_URL }}
          CLOUDFLARE_R2_ENABLED: "false"
          CLOUDFLARE_R2_PRESIGN_EXPIRY_MINUTES: "15"
          CLOUDFLARE_R2_MAX_UPLOAD_SIZE_BYTES: "52428800"
        run: ./mvnw -B clean verify

      - name: Dump surefire reports on failure
        if: failure()
        run: |
          if [ -d target/surefire-reports ]; then
            find target/surefire-reports -maxdepth 1 -type f -print -exec sed -n '1,220p' {} \;
          else
            echo "target/surefire-reports not found"
          fi

      - name: Build backend Docker image
        run: docker build -f docker/backend.Dockerfile -t alphalearn-backend:${{ github.sha }} .
